name: Build Installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            bundles: dmg
            artifact: macos-installer
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-latest
            bundles: nsis
            artifact: windows-installer
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Clean previous bundles
        shell: bash
        run: rm -rf src-tauri/target/release/bundle

      - name: Build Tauri bundle
        run: npm run tauri -- build --bundles ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: raw-jpeg-matcher-${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

  release:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          APP_NAME="照片配对助手"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "Automated installer build for 照片配对助手."
          fi

          rm -rf normalized-release-assets
          mkdir -p normalized-release-assets

          mapfile -d '' files < <(find release-assets -type f \( -name '*.dmg' -o -name '*.exe' \) -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No installer files found under release-assets" >&2
            exit 1
          fi

          for file in "${files[@]}"; do
            case "$file" in
              *.dmg)
                cp "$file" "normalized-release-assets/${APP_NAME}_${VERSION}_macOS_aarch64.dmg"
                ;;
              *.exe)
                cp "$file" "normalized-release-assets/${APP_NAME}_${VERSION}_Windows_x64-setup.exe"
                ;;
            esac
          done

          mapfile -d '' upload_files < <(find normalized-release-assets -type f -print0)
          gh release upload "$TAG" "${upload_files[@]}" --clobber
