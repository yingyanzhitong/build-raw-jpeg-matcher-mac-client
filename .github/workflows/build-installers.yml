name: Build Installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            bundles: app,dmg
            artifact: macos-installer
            artifact_path: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz
              src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          - name: Windows
            os: windows-latest
            bundles: nsis
            artifact: windows-installer
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe.sig

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Clean previous bundles
        shell: bash
        run: rm -rf src-tauri/target/release/bundle

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: raw-jpeg-matcher-${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

  release:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets and updater manifest
        run: |
          rm -rf normalized-release-assets
          node scripts/prepare-release-assets.mjs \
            --input release-assets \
            --output normalized-release-assets \
            --owner masongzhi1 \
            --repo raw-jperaw-jpeg-matcher-mac-clientg-matcher-mac-client \
            --app-name photo-pairing-assistant

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "Automated installer build for 照片配对助手."
          fi

          mapfile -d '' upload_files < <(find normalized-release-assets -type f -print0)
          gh release upload "$TAG" "${upload_files[@]}" --clobber

      - name: Sync release assets to Gitee
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: masongzhi1
          GITEE_REPO: raw-jperaw-jpeg-matcher-mac-clientg-matcher-mac-client
          GITEE_BRANCH: main
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NAME: ${{ steps.version.outputs.tag }}
          RELEASE_BODY: Automated installer build for 照片配对助手.
          RELEASE_ASSET_DIR: normalized-release-assets
          LATEST_JSON_PATH: normalized-release-assets/latest.json
        run: node scripts/sync-gitee-release.mjs
