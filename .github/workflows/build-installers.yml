name: Build Installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-15
            arch: arm64
            bundles: app,dmg
            artifact: macos-aarch64-installer
            artifact_path: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz
              src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          - name: macOS Intel
            os: macos-15-intel
            arch: x64
            bundles: app,dmg
            artifact: macos-x64-installer
            artifact_path: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz
              src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          - name: Windows x64
            os: windows-latest
            arch: x64
            bundles: nsis
            artifact: windows-x64-installer
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe.sig

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify runner architecture
        shell: bash
        run: |
          node -e 'if (process.arch !== process.argv[1]) { throw new Error(`Expected ${process.argv[1]}, got ${process.arch}`) }' "${{ matrix.arch }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Clean previous bundles
        shell: bash
        run: rm -rf src-tauri/target/release/bundle

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: raw-jpeg-matcher-${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

  release:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 90
    outputs:
      release_tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets and updater manifest
        run: |
          rm -rf normalized-release-assets
          node scripts/prepare-release-assets.mjs \
            --input release-assets \
            --output normalized-release-assets \
            --owner masongzhi1 \
            --repo raw-jperaw-jpeg-matcher-mac-clientg-matcher-mac-client \
            --app-name photo-pairing-assistant

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "Automated installer build for 照片配对助手."
          fi

          mapfile -d '' upload_files < <(find normalized-release-assets -type f -print0)
          gh release upload "$TAG" "${upload_files[@]}" --clobber

      - name: Sync release assets to Gitee
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: masongzhi1
          GITEE_REPO: raw-jperaw-jpeg-matcher-mac-clientg-matcher-mac-client
          GITEE_BRANCH: main
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NAME: ${{ steps.version.outputs.tag }}
          RELEASE_BODY: Automated installer build for 照片配对助手.
          RELEASE_ASSET_DIR: normalized-release-assets
          LATEST_JSON_PATH: normalized-release-assets/latest.json
        run: node scripts/sync-gitee-release.mjs

  notify:
    name: Notify WeCom
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.result == 'success' }}
    permissions: {}

    steps:
      - name: Send release success notification
        env:
          WECOM_WEBHOOK_KEY: ${{ secrets.WECOM_WEBHOOK_KEY }}
          RELEASE_TAG: ${{ needs.release.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          if [ -z "$WECOM_WEBHOOK_KEY" ]; then
            echo "::error::当前仓库未配置 WECOM_WEBHOOK_KEY，无法发送企业微信通知"
            exit 1
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          COMMIT_URL="${SERVER_URL}/${REPOSITORY}/commit/${COMMIT_SHA}"
          RUN_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
          CONTENT="$(printf '✅ **照片配对助手发布成功**\n> 版本：`%s`\n> 仓库：%s\n> 提交：[%s](%s)\n> 触发人：%s\n> [查看 GitHub Actions](%s)' "$RELEASE_TAG" "$REPOSITORY" "$SHORT_SHA" "$COMMIT_URL" "$ACTOR" "$RUN_URL")"
          PAYLOAD="$(jq -n --arg content "$CONTENT" '{msgtype: "markdown", markdown: {content: $content}}')"

          if ! RESPONSE="$(curl --silent --show-error --fail-with-body \
            --retry 3 --retry-all-errors --max-time 20 \
            "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WECOM_WEBHOOK_KEY}" \
            -H 'Content-Type: application/json' \
            --data "$PAYLOAD")"; then
            echo "::error::企业微信发布成功通知请求失败"
            exit 1
          fi

          if [ "$(jq -r '.errcode // -1' <<<"$RESPONSE")" != "0" ]; then
            echo "::error::企业微信机器人拒绝消息：$(jq -c . <<<"$RESPONSE")"
            exit 1
          fi

          echo "企业微信发布成功通知已发送：${RELEASE_TAG}"
