name: Build Installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            bundles: dmg
            artifact: macos-installer
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-latest
            bundles: nsis
            artifact: windows-installer
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri -- build --bundles ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: raw-jpeg-matcher-${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}
