name: Sync Gitee Pages

on:
  push:
    branches:
      - main
    paths:
      - gitee-pages/**
      - scripts/sync-gitee-pages.mjs
      - .github/workflows/sync-gitee-pages.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync page branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync Gitee Pages branch
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: masongzhi1
          GITEE_REPO: raw-jperaw-jpeg-matcher-mac-clientg-matcher-mac-client
          GITEE_PAGES_BRANCH: pages
          GITEE_PAGES_SOURCE_DIR: gitee-pages
          LATEST_JSON_URL: https://gitee.com/masongzhi1/raw-jperaw-jpeg-matcher-mac-clientg-matcher-mac-client/raw/main/release/latest.json
        run: node scripts/sync-gitee-pages.mjs
